<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jihadur Rashid | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        /* Moving Background Bubbles */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(#00d2ff, #3a7bd5);
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            top: 10%;
            left: 10%;
            animation: move 10s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 150px); }
        }

        /* Welcome Message with Emoji */
        .welcome-msg {
            font-size: 20px;
            color: white;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px; /* Space between emoji and text */
            animation: fadeInDown 1.5s ease-out;
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 85%;
            transition: transform 0.3s ease;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #00d2ff;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.6);
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 600;
        }

        .dept {
            color: #00d2ff;
            font-size: 14px;
            font-weight: 500;
            margin-top: 5px;
        }

        .uni {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 15px;
            font-style: italic;
        }

        .description {
            font-size: 14px;
            line-height: 1.6;
            color: #ddd;
            margin-bottom: 20px;
        }

        /* Info Section */
        .info-grid {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .info-item {
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
        }

        .info-item span:first-child {
            color: #00d2ff;
            font-weight: 600;
        }

        /* Social Icons */
        .social-links {
            display: flex;
            justify(content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .social-icon {
            color: white;
            font-size: 24px;
            transition: 0.4s;
        }

        .social-icon:hover {
            color: #00d2ff;
            transform: scale(1.3);
        }

        /* Button */
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 35px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn:hover {
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="welcome-msg">
            <span>🚀</span> Welcome To My Website
        </div>
        
        <img src="Jihadur 997.jpeg" alt="Jihadur Rashid" class="profile-img">
        
        <h1>Jihadur Rashid</h1>
        <div class="dept">Department of CSE</div>
        <div class="uni">Green University of Bangladesh</div>
        
        <p class="description">
            Passionate CSE student and aspiring Web Developer. I love creating clean, modern, and high-performance websites.
        </p>
        
        <div class="info-grid">
            <div class="info-item">
                <span>Email</span>
                <span>jihadurrashid997@gmail.com</span>
            </div>
            <div class="info-item">
                <span>Phone</span>
                <span>01810675353</span>
            </div>
        </div>

        <div class="social-links">
            <a href="https://www.facebook.com/share/18NofYZYUD/" target="_blank" class="social-icon">
                <i class="fab fa-facebook"></i>
            </a>
            <a href="mailto:jihadurrashid997@gmail.com" class="social-icon">
                <i class="fas fa-envelope"></i>
            </a>
        </div>

        <a href="https://www.facebook.com/share/18NofYZYUD/" target="_blank" class="btn">Let's Connect</a>
    </div>

</body>
</html>
